<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order · Feelix</title>
  <style>
    /* ----- SIMPLE · WHITE · CLEAN (matches index) ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      color: #1e1e2a;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .order-card {
      max-width: 440px;
      width: 100%;
      background: #ffffff;
      border-radius: 32px;
      padding: 2.2rem 2rem;
      box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.05), 0 4px 12px rgba(0, 0, 0, 0.02);
      border: 1px solid #edf2f7;
      transition: box-shadow 0.2s;
    }

    .order-card:hover {
      box-shadow: 0 24px 40px -12px rgba(0, 0, 0, 0.08);
    }

    /* header mini */
    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .back-link {
      text-decoration: none;
      font-size: 1.8rem;
      line-height: 1;
      color: #64748b;
      transition: color 0.15s;
      margin-right: 4px;
    }

    .back-link:hover {
      color: #0f172a;
    }

    .card-header h2 {
      font-size: 1.9rem;
      font-weight: 650;
      letter-spacing: -0.02em;
      color: #0f172a;
    }

    /* form elements */
    .input-group {
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-weight: 550;
      margin-bottom: 8px;
      color: #334155;
      font-size: 0.95rem;
    }

    .input-field {
      width: 100%;
      padding: 14px 18px;
      font-size: 1rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 20px;
      background: #fafcff;
      transition: all 0.15s;
      outline: none;
      color: #0f172a;
    }

    .input-field:focus {
      border-color: #10b981;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.08);
    }

    .input-field::placeholder {
      color: #94a3b8;
      font-weight: 400;
    }

    /* radio payment */
    .payment-title {
      font-weight: 600;
      margin: 24px 0 12px;
      color: #1e293b;
    }

    .radio-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 20px;
      margin-bottom: 10px;
      background: #fafcff;
      cursor: pointer;
      transition: all 0.15s;
    }

    .radio-option:hover {
      background: #f1f5f9;
      border-color: #cbd5e1;
    }

    .radio-option.selected {
      border-color: #10b981;
      background: #f0fdf9;
    }

    .radio-option input[type="radio"] {
      accent-color: #10b981;
      width: 20px;
      height: 20px;
      margin-left: 8px;
      cursor: pointer;
    }

    .radio-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
      color: #1e293b;
    }

    /* button */
    .btn-confirm {
      width: 100%;
      background: #10b981;
      color: white;
      font-weight: 600;
      font-size: 1.2rem;
      padding: 1rem;
      border: none;
      border-radius: 40px;
      margin-top: 28px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(16, 185, 129, 0.15);
      transition: all 0.2s ease;
      border: 1px solid #05966940;
      letter-spacing: -0.2px;
    }

    .btn-confirm:hover {
      background: #059669;
      transform: translateY(-3px);
      box-shadow: 0 14px 26px rgba(16, 185, 129, 0.25);
    }

    .btn-confirm:active {
      transform: translateY(0);
    }

    .footnote {
      text-align: center;
      margin-top: 18px;
      color: #64748b;
      font-size: 0.85rem;
    }

    .footnote a {
      color: #0f766e;
      text-decoration: none;
      font-weight: 500;
    }

    /* small note */
    .price-hint {
      background: #f8fafc;
      padding: 8px 16px;
      border-radius: 60px;
      font-size: 0.9rem;
      color: #475569;
      display: inline-block;
      margin-top: 6px;
      border: 1px solid #e9edf2;
    }
  </style>
</head>
<body>

<div class="order-card">
  
  <div class="card-header">
    <a href="index.html" class="back-link" title="Back to home">←</a>
    <h2>place order</h2>
  </div>

  <!-- NAME -->
  <div class="input-group">
    <label>👤 Your name</label>
    <input type="text" id="customerName" class="input-field" placeholder="e.g., Alex Rivera" autocomplete="name">
  </div>

  <!-- QUANTITY -->
  <div class="input-group">
    <label>📦 Quantity</label>
    <input type="number" id="quantity" class="input-field" placeholder="1" value="1" min="1" step="1">
  </div>

  <!-- PRICE PREVIEW (simple) -->
  <div class="price-hint">
    ₹1000 per unit · free shipping
  </div>

  <!-- PAYMENT METHOD -->
  <div class="payment-title">💳 Payment method</div>

  <div class="radio-option" id="codOption" onclick="selectPayment('cod')">
    <span class="radio-label">
      <span>🚚</span> Cash on Delivery
    </span>
    <input type="radio" name="paymentMethod" value="COD" id="codRadio">
  </div>

  <div class="radio-option" id="upiOption" onclick="selectPayment('upi')">
    <span class="radio-label">
      <span>📱</span> UPI / QR
    </span>
    <input type="radio" name="paymentMethod" value="UPI" id="upiRadio" checked>
  </div>

  <!-- CONFIRM BUTTON (connects to payment.html) -->
  <button class="btn-confirm" onclick="processOrder()">
    Confirm & continue →
  </button>

  <div class="footnote">
    ✦ secure · fast delivery ✦<br>
    <a href="index.html">← back to home</a>
  </div>
</div>

<script>
  // ---- SIMPLE UI TOGGLE FOR RADIO (visual feedback) ----
  function selectPayment(type) {
    const codDiv = document.getElementById('codOption');
    const upiDiv = document.getElementById('upiOption');
    const codRadio = document.getElementById('codRadio');
    const upiRadio = document.getElementById('upiRadio');
    
    if (type === 'cod') {
      codRadio.checked = true;
      codDiv.classList.add('selected');
      upiDiv.classList.remove('selected');
    } else {
      upiRadio.checked = true;
      upiDiv.classList.add('selected');
      codDiv.classList.remove('selected');
    }
  }

  // initial selected state (UPI is default)
  window.onload = function() {
    selectPayment('upi');
    
    // prefill from localStorage if returning? (optional)
    const savedName = localStorage.getItem('feelix_customer_name');
    if (savedName) {
      document.getElementById('customerName').value = savedName;
    }
    const savedQty = localStorage.getItem('feelix_quantity');
    if (savedQty) {
      document.getElementById('quantity').value = savedQty;
    }
  };

  // ---- PROCESS ORDER & SAVE TO LOCALSTORAGE ----
  function processOrder() {
    const nameInput = document.getElementById('customerName');
    const quantityInput = document.getElementById('quantity');
    
    let name = nameInput.value.trim();
    let quantity = quantityInput.value.trim();
    
    // validation
    if (name === '') {
      alert('✨ Please enter your name');
      nameInput.focus();
      return;
    }
    
    if (quantity === '' || isNaN(quantity) || parseInt(quantity) < 1) {
      alert('📦 Please enter a valid quantity (at least 1)');
      quantityInput.focus();
      return;
    }
    
    quantity = parseInt(quantity);
    
    // get selected payment
    const paymentRadios = document.getElementsByName('paymentMethod');
    let selectedPayment = 'UPI';  // default fallback
    for (let radio of paymentRadios) {
      if (radio.checked) {
        selectedPayment = radio.value;
        break;
      }
    }
    
    // SAVE to localStorage (using clear keys)
    localStorage.setItem('feelix_customer_name', name);
    localStorage.setItem('feelix_quantity', quantity);
    localStorage.setItem('feelix_payment_method', selectedPayment);
    
    // Also keep original keys for compatibility with payment.html (as shown earlier)
    localStorage.setItem('name', name);
    localStorage.setItem('quantity', quantity);
    localStorage.setItem('payment', selectedPayment);
    
    // visual feedback (optional) and redirect
    const btn = document.querySelector('.btn-confirm');
    btn.textContent = '⏳ Redirecting...';
    btn.style.opacity = '0.8';
    
    // short delay to show transition
    setTimeout(() => {
      window.location.href = 'payment.html';
    }, 300);
  }

  // also allow clicking on the whole radio div sets selection
  document.querySelectorAll('.radio-option').forEach(opt => {
    opt.addEventListener('click', function(e) {
      // if click is on the radio itself, the default will handle it; we just style
      const radio = this.querySelector('input[type="radio"]');
      if (radio) {
        radio.checked = true;
        if (radio.value === 'COD') {
          selectPayment('cod');
        } else {
          selectPayment('upi');
        }
      }
    });
  });

  // Prevent double submission / accidental
  let orderProcessing = false;
  const originalProcess = processOrder;
  processOrder = function() {
    if (orderProcessing) return;
    orderProcessing = true;
    originalProcess();
    setTimeout(() => { orderProcessing = false; }, 1000);
  };
</script>

</body>
</html>
